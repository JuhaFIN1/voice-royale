<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: system-ui, sans-serif; font-size: 13px; color: #ccc; background: #1e1e1e; margin: 12px; }
  label { display: block; margin-bottom: 4px; color: #aaa; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  select { width: 100%; padding: 6px 8px; background: #2a2a2a; color: #eee;
    border: 1px solid #444; border-radius: 4px; font-size: 13px; box-sizing: border-box; margin-bottom: 14px; }
  select:focus { outline: none; border-color: #5b9bd5; }
  .status { color: #888; font-size: 11px; margin-bottom: 8px; min-height: 16px; }
  button { background: #2a2a2a; color: #aaa; border: 1px solid #444; border-radius: 4px;
    padding: 4px 12px; font-size: 11px; cursor: pointer; }
  button:hover { background: #363636; color: #fff; }
</style>
</head>
<body>
<div class="status" id="status">Connecting…</div>

<label>Kohde-sivu (Target Page)</label>
<select id="page"></select>

<button onclick="loadFromApp()">↺ Päivitä</button>

<script>
const VR_BASE = 'http://127.0.0.1:17842';
let ws = null;
let actionUUID = null;
let pages = [];
let curPage = 0;
const pageEl = document.getElementById('page');
const statusEl = document.getElementById('status');

function connectElgatoStreamDeckSocket(port, uuid, registerEvent, info) {
    actionUUID = uuid;
    ws = new WebSocket(`ws://127.0.0.1:${port}`);
    ws.onopen = () => {
        ws.send(JSON.stringify({ event: registerEvent, uuid }));
        ws.send(JSON.stringify({ event: 'getSettings', context: uuid }));
        loadFromApp();
    };
    ws.onmessage = evt => {
        let m;
        try { m = JSON.parse(evt.data); } catch { return; }
        if (m.event === 'didReceiveSettings' && m.payload && m.payload.settings) {
            applySettings(m.payload.settings);
        }
    };
}

async function loadFromApp() {
    statusEl.textContent = 'Haetaan…';
    try {
        const r = await fetch(`${VR_BASE}/state`, { cache: 'no-store' });
        if (!r.ok) throw new Error('not ok');
        const d = await r.json();
        pages = d.soundboard_pages || [];
        buildPageDropdown();
        statusEl.textContent = pages.length ? '' : 'Ei sivuja';
    } catch {
        statusEl.textContent = '⚠ Voice Royale ei käynnissä';
    }
}

function buildPageDropdown() {
    pageEl.innerHTML = '';
    pages.forEach((p, i) => {
        const o = document.createElement('option');
        o.value = i;
        o.textContent = `${i + 1}. ${p.name}`;
        pageEl.appendChild(o);
    });
    pageEl.value = curPage;
    if (pageEl.value === '') pageEl.value = 0;
}

function applySettings(s) {
    curPage = s.page !== undefined ? Number(s.page) : 0;
    if (pages.length) {
        pageEl.value = curPage;
    }
}

function save() {
    curPage = Number(pageEl.value) || 0;
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            event: 'setSettings',
            context: actionUUID,
            payload: { page: curPage }
        }));
    }
}

pageEl.addEventListener('change', save);
</script>
</body>
</html>
