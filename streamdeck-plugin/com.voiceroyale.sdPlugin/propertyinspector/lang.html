<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: system-ui, sans-serif; font-size: 13px; color: #ccc; background: #1e1e1e; margin: 12px; }
  label { display: block; margin-bottom: 4px; color: #aaa; }
  select { width: 100%; padding: 5px 8px; background: #333; color: #eee; border: 1px solid #555; border-radius: 4px; font-size: 13px; }
</style>
</head>
<body>
<label>Target Language</label>
<select id="lang">
  <option value="Auto">Auto</option>
  <option value="English">English</option>
  <option value="Finnish">Finnish</option>
  <option value="Swedish">Swedish</option>
  <option value="German">German</option>
  <option value="Russian">Russian</option>
  <option value="Italian">Italian</option>
  <option value="Dutch">Dutch</option>
  <option value="Norwegian">Norwegian</option>
  <option value="Danish">Danish</option>
  <option value="Romanian">Romanian</option>
  <option value="Latvian">Latvian</option>
  <option value="Lithuanian">Lithuanian</option>
  <option value="Japanese">Japanese</option>
  <option value="Chinese">Chinese</option>
  <option value="Hungarian">Hungarian</option>
  <option value="French">French</option>
  <option value="Spanish">Spanish</option>
  <option value="Portuguese">Portuguese</option>
</select>
<script>
  const langEl = document.getElementById('lang');
  function sendSettings() {
    const settings = { lang: langEl.value };
    const json = JSON.stringify({ event: 'sendToPlugin', action: 'com.voiceroyale.lang', payload: { settings } });
    window.opener && window.opener.postMessage(json, '*');
  }
  langEl.addEventListener('change', sendSettings);

  // Receive initial settings
  window.addEventListener('message', (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.event === 'sendToPropertyInspector' && msg.payload && msg.payload.settings) {
        langEl.value = msg.payload.settings.lang || 'English';
      }
    } catch (_) {}
  });
</script>
</body>
</html>
