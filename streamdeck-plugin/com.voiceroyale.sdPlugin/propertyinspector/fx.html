<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: system-ui, sans-serif; font-size: 13px; color: #ccc; background: #1e1e1e; margin: 12px; }
  label { display: block; margin-bottom: 4px; color: #aaa; }
  select { width: 100%; padding: 5px 8px; background: #333; color: #eee; border: 1px solid #555; border-radius: 4px; font-size: 13px; }
</style>
</head>
<body>
<label>Voice FX Preset</label>
<select id="preset">
  <option value="Normal">Normal</option>
  <option value="Pitch +4">Pitch +4</option>
  <option value="Pitch +8">Pitch +8</option>
  <option value="Pitch -4">Pitch -4</option>
  <option value="Pitch -8">Pitch -8</option>
  <option value="Robot">Robot</option>
  <option value="Deep">Deep</option>
  <option value="Helium">Helium</option>
</select>
<script>
  const presetEl = document.getElementById('preset');
  function sendSettings() {
    const settings = { preset: presetEl.value };
    const json = JSON.stringify({ event: 'sendToPlugin', action: 'com.voiceroyale.fx', payload: { settings } });
    window.opener && window.opener.postMessage(json, '*');
  }
  presetEl.addEventListener('change', sendSettings);

  window.addEventListener('message', (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.event === 'sendToPropertyInspector' && msg.payload && msg.payload.settings) {
        presetEl.value = msg.payload.settings.preset || 'Normal';
      }
    } catch (_) {}
  });
</script>
</body>
</html>
