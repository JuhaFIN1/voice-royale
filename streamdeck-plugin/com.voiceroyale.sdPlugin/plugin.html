<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
// Voice Royale Stream Deck Plugin — HTML-based (SDK v2)
// Uses native browser WebSocket + fetch — no npm dependencies.
// POST requests use no body/headers → simple CORS request, no preflight needed.

const VR_PORT = 17842;
const VR_BASE = `http://127.0.0.1:${VR_PORT}`;

// Maps Stream Deck action UUID → VR HTTP action name (null = built dynamically)
const ACTION_MAP = {
    "com.voiceroyale.record.toggle":  "record_toggle",
    "com.voiceroyale.wake.toggle":    "wake_listen_toggle",
    "com.voiceroyale.speak":          "speak",
    "com.voiceroyale.stop":           "stop_recording",
    "com.voiceroyale.lang":           null,  // lang_{language}
    "com.voiceroyale.soundboard":     null,  // soundboard_{page}_{slot}
    "com.voiceroyale.sb.page.next":   "sb_page_next",
    "com.voiceroyale.sb.page.prev":   "sb_page_prev",
    "com.voiceroyale.fx":             null,  // fx_{preset}
    "com.voiceroyale.tts.toggle":     "tts_toggle",
    "com.voiceroyale.settings":       "settings",
};

const contexts = {};    // context → action UUID
const settings = {};    // context → settings object

let ws = null;
let sdPort = null;
let sdUUID = null;
let sdRegisterEvent = null;
let pollTimer = null;
let lastState = {};

// ─── SDK v2 entrypoint ────────────────────────────────────────────────────────
function connectElgatoStreamDeckSocket(port, pluginUUID, registerEvent, info) {
    sdPort = port;
    sdUUID = pluginUUID;
    sdRegisterEvent = registerEvent;

    ws = new WebSocket(`ws://127.0.0.1:${port}`);

    ws.onopen = () => {
        ws.send(JSON.stringify({ event: registerEvent, uuid: pluginUUID }));
        startPolling();
    };

    ws.onmessage = (evt) => {
        let msg;
        try { msg = JSON.parse(evt.data); } catch { return; }
        handleEvent(msg);
    };

    ws.onclose = () => {
        stopPolling();
        setTimeout(() => connectElgatoStreamDeckSocket(sdPort, sdUUID, sdRegisterEvent, {}), 3000);
    };
}

// ─── Event handler ────────────────────────────────────────────────────────────
function handleEvent(msg) {
    const { event, action, context, payload } = msg;
    switch (event) {
        case "keyDown":
            onKeyDown(action, context, payload);
            break;
        case "willAppear":
            contexts[context] = action;
            if (payload && payload.settings) settings[context] = payload.settings;
            applyState(context, action, lastState);
            break;
        case "willDisappear":
            delete contexts[context];
            delete settings[context];
            break;
        case "didReceiveSettings":
            if (payload && payload.settings) settings[context] = payload.settings;
            break;
    }
}

// ─── Button press ─────────────────────────────────────────────────────────────
async function onKeyDown(action, context, payload) {
    const ctx = settings[context] || {};
    let vrAction;

    switch (action) {
        case "com.voiceroyale.soundboard": {
            const page = ctx.page !== undefined ? Number(ctx.page) : 0;
            const slot = ctx.slot !== undefined ? Number(ctx.slot) : 0;
            vrAction = `soundboard_${page}_${slot}`;
            break;
        }
        case "com.voiceroyale.lang":
            vrAction = `lang_${ctx.language || "English"}`;
            break;
        case "com.voiceroyale.fx":
            vrAction = `fx_${ctx.preset || "Normal"}`;
            break;
        default:
            vrAction = ACTION_MAP[action];
            if (!vrAction) return;
    }

    try {
        // No body, no custom headers → simple CORS request, no OPTIONS preflight
        const resp = await fetch(`${VR_BASE}/action/${encodeURIComponent(vrAction)}`, {
            method: "POST",
        });
        if (!resp.ok) showAlert(context);
    } catch {
        showAlert(context);
    }
}

// ─── State polling ────────────────────────────────────────────────────────────
function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollState();
    pollTimer = setInterval(pollState, 2000);
}

function stopPolling() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function pollState() {
    let state;
    try {
        const resp = await fetch(`${VR_BASE}/state`, { cache: "no-store" });
        if (!resp.ok) return;
        state = await resp.json();
    } catch { return; }

    lastState = state;
    for (const [ctx, action] of Object.entries(contexts)) {
        applyState(ctx, action, state);
    }
}

function applyState(context, action, state) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (!state || Object.keys(state).length === 0) return;

    switch (action) {
        case "com.voiceroyale.record.toggle":
            setState(context, state.recording ? 1 : 0);
            setTitle(context, state.recording ? "REC..." : "Record");
            break;
        case "com.voiceroyale.wake.toggle":
            setState(context, state.listening ? 1 : 0);
            setTitle(context, state.listening ? "Listening" : "Listen");
            break;
        case "com.voiceroyale.lang":
            setTitle(context, state.language || "Lang");
            break;
        case "com.voiceroyale.fx":
            setTitle(context, state.fx_preset || "FX");
            break;
        case "com.voiceroyale.tts.toggle":
            setTitle(context, (state.tts_backend || "TTS").split(" ")[0]);
            break;
        case "com.voiceroyale.soundboard": {
            const ctx = settings[context] || {};
            const page = ctx.page !== undefined ? Number(ctx.page) : 0;
            const slot = ctx.slot !== undefined ? Number(ctx.slot) : 0;
            const pages = state.soundboard_pages || [];
            const slots = (pages[page] && pages[page].slots) ? pages[page].slots : [];
            const label = (slots[slot] && slots[slot].name) ? slots[slot].name : `S${slot + 1}`;
            setTitle(context, label);
            break;
        }
        case "com.voiceroyale.sb.page.next": {
            const cur = (state.soundboard_pages || []).findIndex
                ? state.soundboard_page || 0 : 0;
            setTitle(context, `SB >${cur + 2}`);
            break;
        }
        case "com.voiceroyale.sb.page.prev": {
            const cur = state.soundboard_page || 0;
            setTitle(context, `SB <${cur}`);
            break;
        }
    }
}

// ─── WebSocket send helpers ───────────────────────────────────────────────────
function setState(context, stateIndex) {
    ws.send(JSON.stringify({ event: "setState", context, payload: { state: stateIndex } }));
}

function setTitle(context, title) {
    ws.send(JSON.stringify({ event: "setTitle", context, payload: { title: String(title), target: 0 } }));
}

function showAlert(context) {
    ws.send(JSON.stringify({ event: "showAlert", context }));
}
</script>
</body>
</html>
