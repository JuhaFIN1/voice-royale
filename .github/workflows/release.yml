name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version
        id: ver
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install PyQt6 requests python-dotenv sounddevice numpy keyboard openai pyttsx3 edge-tts scipy deep-translator duckduckgo-search
          pip install pvporcupine || true
        shell: pwsh

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller `
            --noconsole `
            --onedir `
            --name "Voice Royale" `
            --icon "iconimage.ico" `
            --add-data "juhalempiainensoftware.png;." `
            --add-data "iconimage.ico;." `
            --hidden-import scipy.signal `
            --hidden-import pyttsx3.drivers `
            --hidden-import pyttsx3.drivers.sapi5 `
            --hidden-import comtypes.stream `
            --collect-all edge_tts `
            --collect-all sounddevice `
            --collect-all certifi `
            --collect-all duckduckgo_search `
            --noconfirm `
            ai_voice_app.py
        shell: pwsh

      - name: Build Stream Deck plugin package
        run: |
          Compress-Archive -Path 'streamdeck-plugin\com.voiceroyale.sdPlugin' `
            -DestinationPath 'streamdeck-plugin\_tmp.zip' -Force
          Rename-Item 'streamdeck-plugin\_tmp.zip' 'com.voiceroyale.streamDeckPlugin'
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Patch installer version
        run: |
          $v = "${{ steps.ver.outputs.VERSION }}"
          (Get-Content installer.iss) `
            -replace 'AppVersion=.*', "AppVersion=$v" `
            -replace 'OutputBaseFilename=.*', "OutputBaseFilename=Voice_Royale_Setup_$v" |
            Set-Content installer.iss
          (Get-Content ai_voice_app.py) `
            -replace 'APP_VERSION = ".*"', "APP_VERSION = `"$v`"" |
            Set-Content ai_voice_app.py
        shell: pwsh

      - name: Build installer
        run: |
          New-Item -ItemType Directory -Force installer_output | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        shell: pwsh

      - name: Sign installer
        continue-on-error: true
        env:
          SIGN_CERT_BASE64: ${{ secrets.SIGN_CERT_BASE64 }}
          SIGN_CERT_PASSWORD: ${{ secrets.SIGN_CERT_PASSWORD }}
        run: |
          if (-not $env:SIGN_CERT_BASE64) { Write-Host "No signing cert secret — skipping"; exit 0 }
          $bytes = [Convert]::FromBase64String($env:SIGN_CERT_BASE64)
          [IO.File]::WriteAllBytes("signing.pfx", $bytes)
          signtool sign /f signing.pfx /p $env:SIGN_CERT_PASSWORD /td sha256 /fd sha256 "installer_output\Voice_Royale_Setup_${{ steps.ver.outputs.VERSION }}.exe"
          Remove-Item signing.pfx
        shell: pwsh

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer_output/Voice_Royale_Setup_${{ steps.ver.outputs.VERSION }}.exe
            streamdeck-plugin/com.voiceroyale.streamDeckPlugin
          generate_release_notes: true

  build-macos-arm64:
    # macos-14 = Apple Silicon (M1/M2/M3) — native ARM64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Patch APP_VERSION in Python source
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          sed -i '' "s/APP_VERSION = \".*\"/APP_VERSION = \"$VERSION\"/" ai_voice_app.py

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow
          pip install PyQt6 requests python-dotenv sounddevice numpy keyboard openai pyttsx3 edge-tts scipy deep-translator
          pip install pvporcupine || true

      - name: Convert icon to icns
        run: |
          mkdir -p iconimage.iconset
          python3 -c "
          from PIL import Image
          img = Image.open('iconimage.ico')
          for n,s in [('icon_16x16',16),('icon_16x16@2x',32),('icon_32x32',32),('icon_32x32@2x',64),('icon_128x128',128),('icon_128x128@2x',256),('icon_256x256',256),('icon_256x256@2x',512),('icon_512x512',512),('icon_512x512@2x',1024)]:
              img.resize((s,s),Image.LANCZOS).save(f'iconimage.iconset/{n}.png')
          "
          iconutil -c icns iconimage.iconset -o iconimage.icns

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller \
            --windowed \
            --onedir \
            --name "Voice Royale" \
            --osx-bundle-identifier "com.voiceroyale.app" \
            --add-data "juhalempiainensoftware.png:." \
            --add-data "iconimage.ico:." \
            --hidden-import scipy.signal \
            --hidden-import pyttsx3.drivers \
            --hidden-import pyttsx3.drivers.nsss \
            --hidden-import PyQt6.sip \
            --collect-all edge_tts \
            --collect-all sounddevice \
            --collect-all _sounddevice_data \
            --collect-all certifi \
            --collect-all pyttsx3 \
            --icon "iconimage.icns" \
            --noconfirm \
            ai_voice_app.py

      - name: Add macOS Info.plist permissions
        run: |
          PLIST="dist/Voice Royale.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Voice Royale needs microphone access for voice recognition.'" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :NSInputMonitoringUsageDescription string 'Voice Royale needs input monitoring for global hotkeys.'" "$PLIST" || true

      - name: Ad-hoc sign app bundle
        run: codesign --deep --force -s - "dist/Voice Royale.app" || true

      - name: Build Stream Deck plugin package
        run: |
          cd streamdeck-plugin
          zip -r com.voiceroyale.streamDeckPlugin com.voiceroyale.sdPlugin

      - name: Create DMG
        run: |
          mkdir -p dmg_stage
          cp -r "dist/Voice Royale.app" "dmg_stage/"
          ln -s /Applications "dmg_stage/Applications"
          mkdir -p "dmg_stage/Stream Deck Plugin"
          cp "streamdeck-plugin/com.voiceroyale.streamDeckPlugin" "dmg_stage/Stream Deck Plugin/"
          sleep 2
          hdiutil create \
            -volname "Voice Royale" \
            -srcfolder dmg_stage \
            -ov -format UDZO \
            "Voice_Royale_${{ steps.ver.outputs.VERSION }}_macOS_arm64.dmg"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Voice_Royale_${{ steps.ver.outputs.VERSION }}_macOS_arm64.dmg

  build-macos-intel:
    # macos-14 (M1 runner) + arch -x86_64 = Intel x86_64 binary via Rosetta 2 cross-build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Patch APP_VERSION in Python source
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          sed -i '' "s/APP_VERSION = \".*\"/APP_VERSION = \"$VERSION\"/" ai_voice_app.py

      - name: Install x86_64 Homebrew and Python 3.11
        run: |
          NONINTERACTIVE=1 arch -x86_64 /bin/bash -c \
            "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          # brew link may fail if /usr/local/bin/python3.11 already exists on runner — ignore
          HOMEBREW_NO_ENV_HINTS=1 arch -x86_64 /usr/local/bin/brew install python@3.11 || true
          # verify the x86_64 Python is accessible via opt/ path
          arch -x86_64 /usr/local/opt/python@3.11/bin/python3.11 --version

      - name: Install Python dependencies (x86_64)
        run: |
          X86_PY="/usr/local/opt/python@3.11/bin/python3.11"
          arch -x86_64 $X86_PY -m pip install --upgrade pip
          arch -x86_64 $X86_PY -m pip install pyinstaller Pillow
          arch -x86_64 $X86_PY -m pip install PyQt6 requests python-dotenv sounddevice numpy keyboard openai pyttsx3 edge-tts scipy deep-translator
          arch -x86_64 $X86_PY -m pip install pvporcupine || true

      - name: Convert icon to icns
        run: |
          mkdir -p iconimage.iconset
          /usr/local/opt/python@3.11/bin/python3.11 -c "
          from PIL import Image
          img = Image.open('iconimage.ico')
          for n,s in [('icon_16x16',16),('icon_16x16@2x',32),('icon_32x32',32),('icon_32x32@2x',64),('icon_128x128',128),('icon_128x128@2x',256),('icon_256x256',256),('icon_256x256@2x',512),('icon_512x512',512),('icon_512x512@2x',1024)]:
              img.resize((s,s),Image.LANCZOS).save(f'iconimage.iconset/{n}.png')
          "
          iconutil -c icns iconimage.iconset -o iconimage.icns

      - name: Build with PyInstaller (x86_64)
        run: |
          X86_PY="/usr/local/opt/python@3.11/bin/python3.11"
          arch -x86_64 $X86_PY -m PyInstaller \
            --windowed \
            --onedir \
            --name "Voice Royale" \
            --osx-bundle-identifier "com.voiceroyale.app" \
            --add-data "juhalempiainensoftware.png:." \
            --add-data "iconimage.ico:." \
            --hidden-import scipy.signal \
            --hidden-import pyttsx3.drivers \
            --hidden-import pyttsx3.drivers.nsss \
            --hidden-import PyQt6.sip \
            --collect-all edge_tts \
            --collect-all sounddevice \
            --collect-all _sounddevice_data \
            --collect-all certifi \
            --collect-all pyttsx3 \
            --icon "iconimage.icns" \
            --noconfirm \
            ai_voice_app.py

      - name: Add macOS Info.plist permissions
        run: |
          PLIST="dist/Voice Royale.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Voice Royale needs microphone access for voice recognition.'" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :NSInputMonitoringUsageDescription string 'Voice Royale needs input monitoring for global hotkeys.'" "$PLIST" || true

      - name: Ad-hoc sign app bundle
        run: codesign --deep --force -s - "dist/Voice Royale.app" || true

      - name: Create DMG
        run: |
          mkdir -p dmg_stage
          cp -r "dist/Voice Royale.app" "dmg_stage/"
          ln -s /Applications "dmg_stage/Applications"
          hdiutil create \
            -volname "Voice Royale" \
            -srcfolder dmg_stage \
            -ov -format UDZO \
            "Voice_Royale_${{ steps.ver.outputs.VERSION }}_macOS_x86_64.dmg"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Voice_Royale_${{ steps.ver.outputs.VERSION }}_macOS_x86_64.dmg
